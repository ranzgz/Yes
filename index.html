<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(-45deg,#ff00ff,#00ffff,#ff6600,#00ff99);
        background-size:400% 400%;
        animation:bgMove 8s ease infinite;
        overflow:hidden;
    }

    h1{
        font-size:5rem;
        color:white;
        text-shadow:0 0 10px #fff,
                    0 0 20px #fff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff;
        animation:blink 1s infinite, float 2s ease-in-out infinite;
    }

    @keyframes blink{
        0%,100%{
            opacity:1;
            transform:scale(1);
        }
        50%{
            opacity:0.5;
            transform:scale(1.1);
        }
    }

    @keyframes float{
        0%,100%{
            transform:translateY(0);
        }
        50%{
            transform:translateY(-20px);
        }
    }

    @keyframes bgMove{
        0%{
            background-position:0% 50%;
        }
        50%{
            background-position:100% 50%;
        }
        100%{
            background-position:0% 50%;
        }
    }
</style>
</head>
<body>

<h1>HELLO WORLD ✨</h1>

</body>
</html>
